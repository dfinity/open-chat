on:
  pull_request:
    branches:
      - master
    paths:
      - "**.rs"
      - "**.toml"
      - "**/Cargo.lock"
      - ".github/workflows/integration_tests.yaml"

name: Integration tests

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integration_tests:
    name: run integration tests
    runs-on:
      - runs-on
      - runner=16cpu-linux-x64
      - family=m7i
      - run-id=${{ github.run_id }}
    steps:
      - name: Install Rustup
        run: |
          curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused -fsSL "https://sh.rustup.rs" | sh -s -- --default-toolchain none -y
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/workflows/setup-rust
      - uses: arduino/setup-protoc@149f6c87b92550901b26acd1632e11c3662e381f # v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build canister wasms
        run: ./scripts/generate-all-canister-wasms.sh
      - name: Run integration tests
        run: ./scripts/run-integration-tests.sh local
